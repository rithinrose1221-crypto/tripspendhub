{% extends "base.html" %}
{% block content %}

<div class="card p-4 shadow">
    <h3 class="mb-3">
        {% if expense %}Edit Expense{% else %}Add Expense{% endif %}
    </h3>

    <form method="post">
        {% csrf_token %}

        <input
            type="text"
            name="description"
            class="form-control mb-3"
            placeholder="Description"
            value="{{ expense.description|default:'' }}"
        >

        <input
            type="number"
            step="0.01"
            name="amount"
            class="form-control mb-3"
            placeholder="Amount"
            value="{{ expense.amount|default:'' }}"
            required
        >

        <input
            type="date"
            name="date"
            class="form-control mb-3"
            value="{{ expense.date|date:'Y-m-d' }}"
            required
        >

        <select name="category" class="form-control mb-3">
            <option value="">Select Category</option>
            {% for cat in categories %}
                <option value="{{ cat.id }}"
                    {% if expense.category and expense.category.id == cat.id %}selected{% endif %}>
                    {{ cat.name }}
                </option>
            {% endfor %}
        </select>

        <button type="submit" class="btn btn-warning">
            {% if expense %}Update Expense{% else %}Add Expense{% endif %}
        </button>
    </form>
</div>

{% endblock %}
